name: Build Windows exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite tirarlo a mano desde la pestaña Actions

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar exe
        run: |
          pyinstaller --onefile --windowed --name "VR-Calibrador" Calibrador_VR-Simulacion.py

      - name: Subir exe como artifact
        uses: actions/upload-artifact@v4
        with:
          name: VR-Calibrador-windows
          path: dist/VR-Calibrador.exe
          retention-days: 30
