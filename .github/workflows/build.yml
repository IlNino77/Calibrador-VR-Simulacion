name: Build Windows exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite tirarlo a mano desde la pestaña Actions

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Compilar exe
        run: |
          python -m nuitka --onefile --assume-yes-for-downloads --windows-console-mode=disable --enable-plugin=tk-inter --windows-icon-from-ico=logosolovr.ico --include-package=customtkinter --include-package=PIL --include-package=pygame --output-filename=VR-Calibrador.exe "Calibrador_VR-Simulacion.py"

      - name: Subir exe como artifact
        uses: actions/upload-artifact@v4
        with:
          name: VR-Calibrador-windows
          path: VR-Calibrador.exe
          retention-days: 30
