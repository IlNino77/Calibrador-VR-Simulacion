name: Build Windows exe

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:   # permite tirarlo a mano desde la pestaña Actions

permissions:
  contents: write   # necesario para poder publicar la Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar exe
        run: |
          pyinstaller --onefile --windowed --icon=logosolovr.ico --name=VR-Calibrador --collect-all customtkinter "Calibrador_VR-Simulacion.py"

      - name: Mover exe a la raiz
        run: |
          move dist\VR-Calibrador.exe VR-Calibrador.exe

      - name: Subir exe como artifact
        uses: actions/upload-artifact@v4
        with:
          name: VR-Calibrador-windows
          path: VR-Calibrador.exe
          retention-days: 30

      - name: Publicar GitHub Release (solo con tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: VR-Calibrador.exe
          generate_release_notes: true
